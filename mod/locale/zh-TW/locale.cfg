section-divider-transport-belt=用於標記傳送帶網路中區段邊界的傳送帶分隔器。
section-divider-fast-transport-belt=用於標記傳送帶網路中區段邊界的快速傳送帶分隔器。
section-divider-express-transport-belt=用於標記傳送帶網路中區段邊界的極速傳送帶分隔器。
section-divider-turbo-transport-belt=用於標記傳送帶網路中區段邊界的渦輪傳送帶分隔器。
section-divider-default-template=用於標記傳送帶網路中區段邊界的 "__1__" 分隔器。
belt-engine=為傳送帶提供電力的引擎。必須放置在傳送帶旁邊並連接到電源。
brushless-belt-engine=具有更高輸出功率的改進型傳送帶引擎。必須放置在傳送帶旁邊並連接到電源。
high-power-brushless-belt-engine=具有最高輸出功率的高級傳送帶引擎。必須放置在傳送帶旁邊並連接到電源。

