[item-description]
section-divider-transport-belt=სატრანსპორტო ლენტის გამყოფი, რომელიც გამოიყენება ლენტების ქსელებში სექციების საზღვრების მონიშვნისთვის.
section-divider-fast-transport-belt=სწრაფი სატრანსპორტო ლენტის გამყოფი, რომელიც გამოიყენება ლენტების ქსელებში სექციების საზღვრების მონიშვნისთვის.
section-divider-express-transport-belt=ექსპრეს სატრანსპორტო ლენტის გამყოფი, რომელიც გამოიყენება ლენტების ქსელებში სექციების საზღვრების მონიშვნისთვის.
section-divider-turbo-transport-belt=ტურბო სატრანსპორტო ლენტის გამყოფი, რომელიც გამოიყენება ლენტების ქსელებში სექციების საზღვრების მონიშვნისთვის.
section-divider-default-template=გამყოფი "__1__", რომელიც გამოიყენება ლენტების ქსელებში სექციების საზღვრების მონიშვნისთვის.
belt-engine=ძრავა, რომელიც ამარაგებს სატრანსპორტო ლენტებს სიმძლავრით. უნდა განთავსდეს ლენტების გვერდით და იყოს დაკავშირებული ელექტროენერგიასთან.
brushless-belt-engine=გაუმჯობესებული ლენტის ძრავა უფრო მაღალი სიმძლავრის გამომავალი სიმძლავრით. უნდა განთავსდეს ლენტების გვერდით და იყოს დაკავშირებული ელექტროენერგიასთან.
high-power-brushless-belt-engine=მოწინავე ლენტის ძრავა უმაღლესი სიმძლავრის გამომავალი სიმძლავრით. უნდა განთავსდეს ლენტების გვერდით და იყოს დაკავშირებული ელექტროენერგიასთან.

