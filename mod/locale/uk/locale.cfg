[item-description]
section-divider-transport-belt=Розділювач транспортної стрічки, використовуваний для позначення меж секцій у мережах стрічок.
section-divider-fast-transport-belt=Розділювач швидкої транспортної стрічки, використовуваний для позначення меж секцій у мережах стрічок.
section-divider-express-transport-belt=Розділювач експрес транспортної стрічки, використовуваний для позначення меж секцій у мережах стрічок.
section-divider-turbo-transport-belt=Розділювач турбо транспортної стрічки, використовуваний для позначення меж секцій у мережах стрічок.
section-divider-default-template=Розділювач "__1__", використовуваний для позначення меж секцій у мережах стрічок.
belt-engine=Двигун, який забезпечує потужність транспортним стрічкам. Має бути розміщений поруч зі стрічками та підключений до електромережі.
brushless-belt-engine=Покращений двигун стрічки з більшою вихідною потужністю. Має бути розміщений поруч зі стрічками та підключений до електромережі.
high-power-brushless-belt-engine=Просунутий двигун стрічки з найвищою вихідною потужністю. Має бути розміщений поруч зі стрічками та підключений до електромережі.

