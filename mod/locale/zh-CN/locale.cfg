[item-description]
section-divider-transport-belt=用于标记传送带网络中区段边界的传送带分隔器。
section-divider-fast-transport-belt=用于标记传送带网络中区段边界的快速传送带分隔器。
section-divider-express-transport-belt=用于标记传送带网络中区段边界的极速传送带分隔器。
section-divider-turbo-transport-belt=用于标记传送带网络中区段边界的涡轮传送带分隔器。
section-divider-default-template=用于标记传送带网络中区段边界的 "__1__" 分隔器。
belt-engine=为传送带提供电力的引擎。必须放置在传送带旁边并连接到电源。
brushless-belt-engine=具有更高输出功率的改进型传送带引擎。必须放置在传送带旁边并连接到电源。
high-power-brushless-belt-engine=具有最高输出功率的高级传送带引擎。必须放置在传送带旁边并连接到电源。

