[item-description]
section-divider-transport-belt=Белдеу желілерінде бөлік шекараларын белгілеу үшін қолданылатын тасымалдау белдеуінің бөлгіші.
section-divider-fast-transport-belt=Белдеу желілерінде бөлік шекараларын белгілеу үшін қолданылатын жылдам тасымалдау белдеуінің бөлгіші.
section-divider-express-transport-belt=Белдеу желілерінде бөлік шекараларын белгілеу үшін қолданылатын экспресс тасымалдау белдеуінің бөлгіші.
section-divider-turbo-transport-belt=Белдеу желілерінде бөлік шекараларын белгілеу үшін қолданылатын турбо тасымалдау белдеуінің бөлгіші.
section-divider-default-template=Бөлгіш "__1__", белдеу желілерінде бөлік шекараларын белгілеу үшін қолданылады.
belt-engine=Тасымалдау белдеулеріне қуат беретін қозғалтқыш. Белдеулердің жанына орналастырылуы және электрмен қосылуы керек.
brushless-belt-engine=Жоғарырақ қуат шығысы бар жақсартылған белдеу қозғалтқышы. Белдеулердің жанына орналастырылуы және электрмен қосылуы керек.
high-power-brushless-belt-engine=Ең жоғары қуат шығысы бар озық белдеу қозғалтқышы. Белдеулердің жанына орналастырылуы және электрмен қосылуы керек.

