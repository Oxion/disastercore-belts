[item-description]
section-divider-transport-belt=Раздзяляльнік транспартнай стужкі, які выкарыстоўваецца для пазначэння межаў секцый у сетках стужак.
section-divider-fast-transport-belt=Раздзяляльнік хуткай транспартнай стужкі, які выкарыстоўваецца для пазначэння межаў секцый у сетках стужак.
section-divider-express-transport-belt=Раздзяляльнік экспрэс транспартнай стужкі, які выкарыстоўваецца для пазначэння межаў секцый у сетках стужак.
section-divider-turbo-transport-belt=Раздзяляльнік турба транспартнай стужкі, які выкарыстоўваецца для пазначэння межаў секцый у сетках стужак.
section-divider-default-template=Раздзяляльнік "__1__", які выкарыстоўваецца для пазначэння межаў секцый у сетках стужак.
belt-engine=Рухавік, які забяспечвае магутнасць транспартным стужкам. Павінен быць размешчаны побач са стужкамі і падключаны да электрычнай сеткі.
brushless-belt-engine=Удасканалены рухавік стужкі з больш высокай выхадной магутнасцю. Павінен быць размешчаны побач са стужкамі і падключаны да электрычнай сеткі.
high-power-brushless-belt-engine=Прасунуты рухавік стужкі з максімальнай выхадной магутнасцю. Павінен быць размешчаны побач са стужкамі і падключаны да электрычнай сеткі.

